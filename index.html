<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 絕對節奏 (Rhythm Flow) - 盲打特訓</title>
    
    <!-- Fonts for Elegant Styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">

    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', '"Noto Serif TC"', 'serif'],
                    },
                    colors: {
                        coffee: {
                            900: '#1a1410',
                            800: '#2d221b',
                            700: '#4a372a',
                            600: '#6b4c3a',
                            500: '#8b6d43',
                            400: '#a88b5c',
                            300: '#c5a059',
                            200: '#e6d5c3',
                            100: '#f4ede4'
                        },
                        gold: '#d4af37',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #080605;
            color: #e6d5c3;
            overflow: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* 典雅發光效果 */
        .glow-text {
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.4), 0 0 20px rgba(197, 160, 89, 0.2);
        }
        
        .glow-text-gold {
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6), 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .btn-elegant {
            background: transparent;
            border: 1px solid #4a372a;
            color: #a88b5c;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-elegant::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(197, 160, 89, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-elegant:hover::before {
            transform: translateX(100%);
        }

        .btn-elegant:hover {
            border-color: #c5a059;
            color: #e6d5c3;
            box-shadow: 0 0 20px rgba(139, 109, 67, 0.2) inset, 0 0 20px rgba(139, 109, 67, 0.2);
        }

        .btn-elegant.active {
            background: rgba(74, 55, 42, 0.3);
            border-color: #c5a059;
            color: #d4af37;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.3) inset;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #0a0807 0%, #16120e 100%);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border-left: 1px solid rgba(139, 109, 67, 0.2);
            border-right: 1px solid rgba(139, 109, 67, 0.2);
        }

        /* 脈衝動畫 */
        @keyframes pulse-elegant {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
            50% { transform: scale(1.1); text-shadow: 0 0 25px rgba(212, 175, 55, 0.8); }
            100% { transform: scale(1); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        }
        
        .animate-combo {
            animation: pulse-elegant 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel {
            background: rgba(10, 8, 7, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 109, 67, 0.15);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- 遊戲資料與設定 ---
        const zhuyinMap = {
            '1': 'ㄅ', '2': 'ㄉ', '3': 'ˇ', '4': 'ˋ', '5': 'ㄓ', '6': 'ˊ', '7': '˙', '8': 'ㄚ', '9': 'ㄞ', '0': 'ㄢ', '-': 'ㄦ',
            'q': 'ㄆ', 'w': 'ㄊ', 'e': 'ㄍ', 'r': 'ㄐ', 't': 'ㄔ', 'y': 'ㄗ', 'u': 'ㄧ', 'i': 'ㄛ', 'o': 'ㄟ', 'p': 'ㄣ',
            'a': 'ㄇ', 's': 'ㄋ', 'd': 'ㄎ', 'f': 'ㄑ', 'g': 'ㄕ', 'h': 'ㄘ', 'j': 'ㄨ', 'k': 'ㄜ', 'l': 'ㄠ', ';': 'ㄤ',
            'z': 'ㄈ', 'x': 'ㄌ', 'c': 'ㄏ', 'v': 'ㄒ', 'b': 'ㄖ', 'n': 'ㄙ', 'm': 'ㄩ', ',': 'ㄝ', '.': 'ㄡ', '/': 'ㄥ'
        };
        
        // 實體鍵盤位置對應與手部標示 (row: 1最上 4最下, col: 0~10由左至右, hand: L左手 R右手)
        const keyboardLayout = {
            '1': { col: 0, hand: 'L', row: 1 }, '2': { col: 1, hand: 'L', row: 1 }, '3': { col: 2, hand: 'L', row: 1 }, '4': { col: 3, hand: 'L', row: 1 }, '5': { col: 4, hand: 'L', row: 1 },
            '6': { col: 5, hand: 'R', row: 1 }, '7': { col: 6, hand: 'R', row: 1 }, '8': { col: 7, hand: 'R', row: 1 }, '9': { col: 8, hand: 'R', row: 1 }, '0': { col: 9, hand: 'R', row: 1 }, '-': { col: 10, hand: 'R', row: 1 },
            'q': { col: 0, hand: 'L', row: 2 }, 'w': { col: 1, hand: 'L', row: 2 }, 'e': { col: 2, hand: 'L', row: 2 }, 'r': { col: 3, hand: 'L', row: 2 }, 't': { col: 4, hand: 'L', row: 2 },
            'y': { col: 5, hand: 'R', row: 2 }, 'u': { col: 6, hand: 'R', row: 2 }, 'i': { col: 7, hand: 'R', row: 2 }, 'o': { col: 8, hand: 'R', row: 2 }, 'p': { col: 9, hand: 'R', row: 2 },
            'a': { col: 0, hand: 'L', row: 3 }, 's': { col: 1, hand: 'L', row: 3 }, 'd': { col: 2, hand: 'L', row: 3 }, 'f': { col: 3, hand: 'L', row: 3 }, 'g': { col: 4, hand: 'L', row: 3 },
            'h': { col: 5, hand: 'R', row: 3 }, 'j': { col: 6, hand: 'R', row: 3 }, 'k': { col: 7, hand: 'R', row: 3 }, 'l': { col: 8, hand: 'R', row: 3 }, ';': { col: 9, hand: 'R', row: 3 },
            'z': { col: 0, hand: 'L', row: 4 }, 'x': { col: 1, hand: 'L', row: 4 }, 'c': { col: 2, hand: 'L', row: 4 }, 'v': { col: 3, hand: 'L', row: 4 }, 'b': { col: 4, hand: 'L', row: 4 },
            'n': { col: 5, hand: 'R', row: 4 }, 'm': { col: 6, hand: 'R', row: 4 }, ',': { col: 7, hand: 'R', row: 4 }, '.': { col: 8, hand: 'R', row: 4 }, '/': { col: 9, hand: 'R', row: 4 }
        };

        // 色彩定義 (高雅咖啡/金色系)
        const colors = {
            perfect: '#d4af37', // 金色
            great: '#c5a059',   // 淺咖啡金
            good: '#8b6d43',    // 深咖啡
            bg: '#0a0807',
            hitLine: 'rgba(197, 160, 89, 0.6)'
        };

        const App = () => {
            const [gameState, setGameState] = useState('menu'); // menu, playing
            const [language, setLanguage] = useState('en');
            const [difficulty, setDifficulty] = useState('novice-1');
            
            // 暫停狀態
            const [isPaused, setIsPaused] = useState(false);
            const isPausedRef = useRef(false);
            
            const canvasRef = useRef(null);
            
            // HUD Refs (避免 React 重新渲染導致 Canvas 掉幀)
            const scoreDisplayRef = useRef(null);
            const comboDisplayRef = useRef(null);
            
            // 遊戲引擎狀態
            const engine = useRef({
                score: 0,
                combo: 0,
                maxCombo: 0,
                notes: [],
                particles: [],
                feedbackTexts: [],
                canvasWidth: 0,
                canvasHeight: 0,
                hitLineY: 0,
                lastTime: 0,
                lastSpawnTime: 0,
                pauseStartTime: 0, // 記錄暫停的當下時間
                noteSpeed: 0.3,
                spawnInterval: 1000,
                hitLineGlow: 0,
                reqId: null,
                lang: 'en', // 存儲當下遊戲語言，防止閉包問題
                diff: 'normal' // 存儲當下難度
            });

            // 音效引擎 Refs
            const audioCtx = useRef({
                initialized: false,
                synthHit: null,
                synthMiss: null,
                bgmSynth: null,
                bgmLoop: null
            });

            // 初始化 Lucide 圖示
            useEffect(() => {
                lucide.createIcons();
            }, [gameState, isPaused, language, difficulty]);

            // --- 視窗縮放處理 ---
            useEffect(() => {
                const handleResize = () => {
                    const canvas = canvasRef.current;
                    if (!canvas) return;
                    
                    const width = Math.min(window.innerWidth, 600);
                    const height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                    
                    engine.current.canvasWidth = width;
                    engine.current.canvasHeight = height;
                    engine.current.hitLineY = height * 0.85;
                };
                
                window.addEventListener('resize', handleResize);
                handleResize(); // 初始呼叫
                
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // --- 音效初始化 ---
            const initAudio = async () => {
                if (audioCtx.current.initialized) return;
                await Tone.start();
                
                // 擊中音效 (和弦用 PolySynth)
                audioCtx.current.synthHit = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: 'triangle' },
                    envelope: { attack: 0.005, decay: 0.2, sustain: 0.1, release: 0.5 }
                }).toDestination();
                audioCtx.current.synthHit.volume.value = -8;

                // 【修正區】將失誤音效也改為 PolySynth，解決玩家短時間連續按錯導致的 Timeline 排程崩潰問題
                audioCtx.current.synthMiss = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.4 }
                }).toDestination();
                audioCtx.current.synthMiss.volume.value = -2;

                audioCtx.current.bgmSynth = new Tone.MembraneSynth({
                    envelope: { attack: 0.02, decay: 0.5, sustain: 0, release: 0.4 }
                }).toDestination();
                audioCtx.current.bgmSynth.volume.value = -12;
                
                audioCtx.current.initialized = true;
            };

            const startBGM = (bpm) => {
                Tone.Transport.bpm.value = bpm;
                if(audioCtx.current.bgmLoop) audioCtx.current.bgmLoop.dispose();
                
                audioCtx.current.bgmLoop = new Tone.Loop(time => {
                    audioCtx.current.bgmSynth.triggerAttackRelease("C1", "8n", time);
                    engine.current.hitLineGlow = 1.0; 
                }, "4n").start(0);
                
                Tone.Transport.start();
            };

            const stopBGM = () => {
                Tone.Transport.stop();
                if(audioCtx.current.bgmLoop) audioCtx.current.bgmLoop.stop();
            };

            // --- 核心遊戲邏輯 ---
            const updateHUD = () => {
                if (scoreDisplayRef.current) {
                    scoreDisplayRef.current.innerText = Math.floor(engine.current.score).toString().padStart(5, '0');
                }
                if (comboDisplayRef.current) {
                    comboDisplayRef.current.innerText = engine.current.combo;
                    
                    comboDisplayRef.current.classList.remove('animate-combo');
                    void comboDisplayRef.current.offsetWidth;
                    comboDisplayRef.current.classList.add('animate-combo');
                    
                    if(engine.current.combo > 10) {
                        comboDisplayRef.current.style.color = colors.perfect;
                    } else {
                        comboDisplayRef.current.style.color = '#e6d5c3';
                    }
                }
            };

            const spawnNote = () => {
                const eng = engine.current;
                const isZh = language === 'zh';
                let pool = [];
                const allKeys = Object.keys(keyboardLayout);

                // 根據難度決定出題字庫
                if (difficulty === 'novice-1') {
                    pool = allKeys.filter(k => keyboardLayout[k].row === 3);
                } else if (difficulty === 'novice-2') {
                    pool = allKeys.filter(k => keyboardLayout[k].row === 2 || keyboardLayout[k].row === 3);
                } else if (difficulty === 'novice-3') {
                    pool = allKeys.filter(k => keyboardLayout[k].row >= 2 && keyboardLayout[k].row <= 4);
                } else {
                    pool = allKeys; // novice-4, standard, expert
                }

                const targetKey = pool[Math.floor(Math.random() * pool.length)];
                const keyInfo = keyboardLayout[targetKey];
                
                // 處理顯示字元 (注音 vs 英文)
                let displayChar;
                if (isZh) {
                    displayChar = zhuyinMap[targetKey];
                } else {
                    // 標點符號不轉大寫
                    const punctuation = [';', '-', ',', '.', '/'];
                    displayChar = punctuation.includes(targetKey) ? targetKey : targetKey.toUpperCase();
                }

                let x;
                let color;

                // 決定掉落軌道
                if (difficulty === 'expert') {
                    // 高手模式：打亂軌道位置 (5軌隨機)
                    const currentLanes = 5;
                    const laneWidth = eng.canvasWidth / currentLanes;
                    const randomLane = Math.floor(Math.random() * currentLanes);
                    x = (randomLane * laneWidth) + (laneWidth / 2);
                } else {
                    // 新手村與標準模式：嚴格對應實體鍵盤位置 (11軌對應)
                    const currentLanes = 11;
                    const laneWidth = eng.canvasWidth / currentLanes;
                    x = (keyInfo.col * laneWidth) + (laneWidth / 2);
                }

                // 決定顏色 (新手模式分左右手)
                if (difficulty.startsWith('novice')) {
                    // 左手金色，右手銀白
                    color = keyInfo.hand === 'L' ? '#d4af37' : '#cbd5e1';
                } else {
                    const noteColors = [colors.perfect, colors.great, '#e6d5c3', '#a88b5c'];
                    color = noteColors[Math.floor(Math.random() * noteColors.length)];
                }

                eng.notes.push({
                    x, y: -50,
                    targetKey, displayChar,
                    active: true, color
                });
            };

            const createParticles = (x, y, color) => {
                for (let i = 0; i < 12; i++) {
                    engine.current.particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: 400 + Math.random() * 300,
                        color,
                        size: Math.random() * 3 + 1
                    });
                }
            };

            const registerHit = (text, x, y, pts, color) => {
                engine.current.score += pts * (1 + (engine.current.combo * 0.1));
                engine.current.combo++;
                if (engine.current.combo > engine.current.maxCombo) {
                    engine.current.maxCombo = engine.current.combo;
                }
                
                engine.current.feedbackTexts.push({ text, x, y, life: 600, maxLife: 600, color });
                updateHUD();
            };

            const registerMiss = (isWrongKey = false) => {
                engine.current.combo = 0;
                updateHUD();
                
                if (audioCtx.current.initialized && audioCtx.current.synthMiss) {
                    // 加入 Tone.now() 確保 PolySynth 調度準確，避免連按錯誤導致排程衝突
                    audioCtx.current.synthMiss.triggerAttackRelease("G1", "16n", Tone.now());
                }
            };

            // 遊戲更新循環
            const update = (deltaTime) => {
                const currentTime = performance.now();
                const eng = engine.current;

                if (currentTime - eng.lastSpawnTime > eng.spawnInterval) {
                    spawnNote();
                    eng.lastSpawnTime = currentTime;
                }

                for (let i = eng.notes.length - 1; i >= 0; i--) {
                    let note = eng.notes[i];
                    if (!note.active) continue;

                    note.y += eng.noteSpeed * deltaTime;

                    if (note.y > eng.canvasHeight + 50) {
                        note.active = false;
                        registerMiss();
                    }
                }
                eng.notes = eng.notes.filter(n => n.active);

                eng.hitLineGlow = Math.max(0, eng.hitLineGlow - deltaTime * 0.001);
                
                for (let i = eng.particles.length - 1; i >= 0; i--) {
                    let p = eng.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= deltaTime;
                    if (p.life <= 0) eng.particles.splice(i, 1);
                }

                for (let i = eng.feedbackTexts.length - 1; i >= 0; i--) {
                    let f = eng.feedbackTexts[i];
                    f.y -= deltaTime * 0.03;
                    f.life -= deltaTime;
                    if (f.life <= 0) eng.feedbackTexts.splice(i, 1);
                }
            };

            // 繪圖循環
            const draw = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const eng = engine.current;

                ctx.clearRect(0, 0, eng.canvasWidth, eng.canvasHeight);

                // 計算當前軌道數
                const currentLanes = difficulty === 'expert' ? 5 : 11;
                const laneWidth = eng.canvasWidth / currentLanes;

                // 畫軌道背景線
                ctx.strokeStyle = 'rgba(139, 109, 67, 0.08)';
                ctx.lineWidth = 1;
                for(let i=1; i<currentLanes; i++){
                    ctx.beginPath();
                    ctx.moveTo(i * laneWidth, 0);
                    ctx.lineTo(i * laneWidth, eng.canvasHeight);
                    ctx.stroke();
                }

                // 畫判定線
                const glowAlpha = 0.15 + eng.hitLineGlow * 0.4;
                ctx.shadowBlur = 15 * eng.hitLineGlow;
                ctx.shadowColor = colors.perfect;
                ctx.fillStyle = `rgba(212, 175, 55, ${glowAlpha})`;
                ctx.fillRect(0, eng.hitLineY - 2, eng.canvasWidth, 4);
                
                ctx.fillStyle = 'rgba(212, 175, 55, 0.8)';
                ctx.fillRect(0, eng.hitLineY - 2, 8, 4);
                ctx.fillRect(eng.canvasWidth - 8, eng.hitLineY - 2, 8, 4);
                ctx.shadowBlur = 0; 

                // 畫音符 (動態縮放半徑與字體)
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const noteRadius = Math.min(22, laneWidth * 0.45);
                
                for (let note of eng.notes) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = note.color;
                    ctx.strokeStyle = note.color;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(note.x, note.y, noteRadius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(10, 8, 7, 0.8)';
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.fillStyle = note.color;
                    const fontSize = Math.max(12, noteRadius);
                    ctx.font = `500 ${fontSize}px "Noto Serif TC", "Playfair Display"`;
                    ctx.fillText(note.displayChar, note.x, note.y + (fontSize * 0.1));
                    ctx.shadowBlur = 0; 
                }

                // 畫粒子
                for (let p of eng.particles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 700;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;

                // 畫文字回饋
                for (let f of eng.feedbackTexts) {
                    ctx.fillStyle = f.color;
                    ctx.globalAlpha = f.life / f.maxLife;
                    ctx.font = 'italic 600 20px "Playfair Display"';
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = f.color;
                    ctx.fillText(f.text, f.x, f.y);
                }
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
            };

            const gameLoop = useCallback((currentTime) => {
                if (gameState !== 'playing') return;

                const deltaTime = currentTime - engine.current.lastTime;
                engine.current.lastTime = currentTime;

                update(deltaTime);
                draw();

                engine.current.reqId = requestAnimationFrame(gameLoop);
            }, [gameState]);

            // --- 暫停功能邏輯 ---
            const togglePause = useCallback(() => {
                if (gameState !== 'playing') return;
                
                const newPaused = !isPausedRef.current;
                isPausedRef.current = newPaused;
                setIsPaused(newPaused);
                
                if (newPaused) {
                    Tone.Transport.pause();
                    if (engine.current.reqId) cancelAnimationFrame(engine.current.reqId);
                    engine.current.pauseStartTime = performance.now();
                } else {
                    Tone.Transport.start();
                    // 扣除暫停經過的時間，避免音符瞬間暴走掉落
                    const pauseDuration = performance.now() - engine.current.pauseStartTime;
                    engine.current.lastTime += pauseDuration;
                    engine.current.lastSpawnTime += pauseDuration;
                    
                    engine.current.reqId = requestAnimationFrame(gameLoop);
                }
            }, [gameState, gameLoop]);

            const quitGame = () => {
                isPausedRef.current = false;
                setIsPaused(false);
                setGameState('menu');
                stopBGM();
                if (engine.current.reqId) cancelAnimationFrame(engine.current.reqId);
            };

            // --- 鍵盤監聽 ---
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (gameState !== 'playing') return;
                    
                    // 暫停快捷鍵
                    if (e.key === 'Escape') {
                        togglePause();
                        return;
                    }
                    
                    if (isPausedRef.current) return;
                    if (e.ctrlKey || e.altKey || e.metaKey || e.shiftKey) return;
                    
                    let key = e.key.toLowerCase();
                    const eng = engine.current;
                    let targetNoteIndex = -1;
                    let max_Y = -100;

                    for (let i = 0; i < eng.notes.length; i++) {
                        if (eng.notes[i].targetKey === key && eng.notes[i].y > max_Y) {
                            let dist = Math.abs(eng.notes[i].y - eng.hitLineY);
                            if (dist < 150) { 
                                max_Y = eng.notes[i].y;
                                targetNoteIndex = i;
                            }
                        }
                    }

                    if (targetNoteIndex !== -1) {
                        let note = eng.notes[targetNoteIndex];
                        let dist = Math.abs(note.y - eng.hitLineY);
                        note.active = false;

                        createParticles(note.x, note.y, note.color);
                        
                        if (dist < 30) {
                            registerHit('Perfect', note.x, note.y, 300, colors.perfect);
                            audioCtx.current.synthHit?.triggerAttackRelease(["C5", "E5", "G5"], "16n", Tone.now());
                        } else if (dist < 80) {
                            registerHit('Great', note.x, note.y, 100, colors.great);
                            audioCtx.current.synthHit?.triggerAttackRelease("E5", "16n", Tone.now());
                        } else {
                            registerHit('Good', note.x, note.y, 50, colors.good);
                            audioCtx.current.synthHit?.triggerAttackRelease("C5", "16n", Tone.now());
                        }
                    } else {
                        registerMiss(true);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [gameState, togglePause]);

            // --- 啟動與停止邏輯 ---
            useEffect(() => {
                if (gameState === 'playing' && !isPausedRef.current) {
                    const eng = engine.current;
                    eng.score = 0; eng.combo = 0; eng.maxCombo = 0;
                    eng.notes = []; eng.particles = []; eng.feedbackTexts = [];
                    updateHUD();

                    let bpm = 100;
                    if (difficulty.startsWith('novice')) { 
                        bpm = 80; 
                        eng.noteSpeed = window.innerHeight * 0.00035; 
                    } else if (difficulty === 'standard') { 
                        bpm = 120; 
                        eng.noteSpeed = window.innerHeight * 0.00055; 
                    } else if (difficulty === 'expert') { 
                        bpm = 160; 
                        eng.noteSpeed = window.innerHeight * 0.00085; 
                    }
                    
                    eng.spawnInterval = 60000 / bpm;
                    
                    startBGM(bpm);
                    eng.lastTime = performance.now();
                    eng.lastSpawnTime = eng.lastTime;
                    eng.reqId = requestAnimationFrame(gameLoop);
                }
                
                return () => {
                    if (gameState !== 'playing') {
                        stopBGM();
                        if (engine.current.reqId) cancelAnimationFrame(engine.current.reqId);
                    }
                };
            }, [gameState, difficulty]); // 將 gameLoop 移出依賴，避免重複初始化

            const handleStart = async () => {
                await initAudio();
                setGameState('playing');
                isPausedRef.current = false;
                setIsPaused(false);
            };

            return (
                <div className="relative w-screen h-screen flex justify-center items-center bg-coffee-900 font-serif">
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-coffee-800/40 via-coffee-900/80 to-black pointer-events-none z-0"></div>
                    
                    <canvas ref={canvasRef} className="relative z-10"></canvas>
                    
                    {/* HUD Layer */}
                    <div className={`absolute top-0 left-0 w-full h-full pointer-events-none flex flex-col z-20 transition-opacity duration-500 ${gameState === 'playing' ? 'opacity-100' : 'opacity-0'}`}>
                        <div className="flex justify-between items-start p-6 md:p-10 w-full max-w-[600px] mx-auto">
                            <div className="flex flex-col">
                                <span className="text-coffee-400 text-xs tracking-[0.3em] uppercase mb-1">Score</span>
                                <span ref={scoreDisplayRef} className="text-3xl font-semibold text-coffee-100 glow-text tabular-nums">00000</span>
                            </div>
                            
                            {/* 暫停按鈕 */}
                            <button 
                                onClick={togglePause}
                                className="pointer-events-auto mt-1 flex flex-col items-center justify-center group cursor-pointer"
                                title="暫停 (ESC)"
                            >
                                <div className="p-3 rounded-full border border-coffee-700/50 bg-coffee-900/50 text-coffee-400 group-hover:text-gold group-hover:border-gold transition-all duration-300">
                                    <i data-lucide={isPaused ? "play" : "pause"} className="w-5 h-5"></i>
                                </div>
                            </button>

                            <div className="flex flex-col items-end">
                                <span className="text-coffee-400 text-xs tracking-[0.3em] uppercase mb-1">Combo</span>
                                <span ref={comboDisplayRef} className="text-4xl font-bold text-gold glow-text-gold tabular-nums transition-colors duration-300">0</span>
                            </div>
                        </div>
                    </div>

                    {/* Pause Screen */}
                    {isPaused && (
                        <div className="absolute inset-0 glass-panel z-40 flex flex-col justify-center items-center">
                            <h2 className="text-4xl md:text-5xl font-black text-gold glow-text-gold mb-12 tracking-[0.3em]">PAUSED</h2>
                            <div className="flex flex-col gap-6 w-full max-w-xs">
                                <button onClick={togglePause} className="btn-elegant py-4 text-sm tracking-[0.3em] uppercase cursor-pointer">
                                    Resume
                                </button>
                                <button onClick={quitGame} className="btn-elegant py-4 text-sm tracking-[0.3em] uppercase text-coffee-400 cursor-pointer">
                                    Quit to Menu
                                </button>
                            </div>
                            <p className="absolute bottom-10 text-coffee-500 text-xs tracking-widest">Press ESC to Resume</p>
                        </div>
                    )}

                    {/* Menu Screen */}
                    {gameState === 'menu' && (
                        <div className="absolute inset-0 glass-panel z-50 flex flex-col justify-center items-center">
                            <div className="text-center mb-16">
                                <h1 className="text-5xl md:text-7xl font-black mb-4 tracking-widest text-gold glow-text-gold flex items-center justify-center gap-4">
                                    <i data-lucide="music-4" className="w-10 h-10 md:w-14 md:h-14"></i>
                                    RHYTHM FLOW
                                </h1>
                                <div className="h-px w-32 bg-gradient-to-r from-transparent via-gold to-transparent mx-auto mb-4 opacity-50"></div>
                                <p className="text-lg tracking-[0.5em] text-coffee-300 font-light">盲打極限特訓艙</p>
                            </div>

                            <div className="flex flex-col items-center gap-8 w-full max-w-lg px-6">
                                {/* Language Selection */}
                                <div className="w-full">
                                    <p className="text-coffee-400 text-xs tracking-widest text-center mb-3 uppercase">Layout</p>
                                    <div className="flex gap-4 w-full">
                                        <button 
                                            className={`flex-1 py-3 px-4 rounded-sm text-sm tracking-wider cursor-pointer btn-elegant ${language === 'en' ? 'active' : ''}`}
                                            onClick={() => setLanguage('en')}
                                        >
                                            英文模式 (A-Z)
                                        </button>
                                        <button 
                                            className={`flex-1 py-3 px-4 rounded-sm text-sm tracking-wider cursor-pointer btn-elegant ${language === 'zh' ? 'active' : ''}`}
                                            onClick={() => setLanguage('zh')}
                                        >
                                            注音模式 (ㄅ-ㄦ)
                                        </button>
                                    </div>
                                    {language === 'zh' && (
                                        <p className="text-coffee-300 text-xs mt-3 text-center opacity-80 flex items-center justify-center gap-1">
                                            <i data-lucide="alert-circle" className="w-3 h-3"></i> 練習前請確保實體輸入法為【英文】
                                        </p>
                                    )}
                                </div>

                                {/* Difficulty Selection */}
                                <div className="w-full">
                                    <p className="text-coffee-400 text-xs tracking-widest text-center mb-3 uppercase border-b border-coffee-800 pb-2">Difficulty</p>
                                    
                                    <div className="flex flex-col gap-4">
                                        {/* A: 新手村 */}
                                        <div className="bg-coffee-900/30 p-3 rounded-md border border-coffee-700/30">
                                            <p className="text-gold text-[10px] tracking-widest text-left mb-2 uppercase">A. 新手村 (左右手雙色標示，固定鍵位)</p>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2 w-full">
                                                <button onClick={() => setDifficulty('novice-1')} className={`py-2 px-1 rounded-sm text-[10px] tracking-widest cursor-pointer btn-elegant ${difficulty === 'novice-1' ? 'active' : ''}`}>LV.1 (基準列)</button>
                                                <button onClick={() => setDifficulty('novice-2')} className={`py-2 px-1 rounded-sm text-[10px] tracking-widest cursor-pointer btn-elegant ${difficulty === 'novice-2' ? 'active' : ''}`}>LV.2 (+上列)</button>
                                                <button onClick={() => setDifficulty('novice-3')} className={`py-2 px-1 rounded-sm text-[10px] tracking-widest cursor-pointer btn-elegant ${difficulty === 'novice-3' ? 'active' : ''}`}>LV.3 (+下列)</button>
                                                <button onClick={() => setDifficulty('novice-4')} className={`py-2 px-1 rounded-sm text-[10px] tracking-widest cursor-pointer btn-elegant ${difficulty === 'novice-4' ? 'active' : ''}`}>LV.4 (全鍵盤)</button>
                                            </div>
                                        </div>

                                        {/* B & C: 進階與高手 */}
                                        <div className="bg-coffee-900/30 p-3 rounded-md border border-coffee-700/30">
                                            <p className="text-coffee-300 text-[10px] tracking-widest text-left mb-2 uppercase">B. 進階挑戰 (顏色統一)</p>
                                            <div className="grid grid-cols-2 gap-2 w-full">
                                                <button onClick={() => setDifficulty('standard')} className={`py-2 px-2 rounded-sm text-[10px] tracking-widest cursor-pointer btn-elegant ${difficulty === 'standard' ? 'active' : ''}`}>標準 (固定鍵位，速度提升)</button>
                                                <button onClick={() => setDifficulty('expert')} className={`py-2 px-2 rounded-sm text-[10px] tracking-widest cursor-pointer btn-elegant ${difficulty === 'expert' ? 'active' : ''}`}>高手 (隨機掉落，極限速度)</button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 難度提示文字 */}
                                    <div className="h-6 mt-3 flex justify-center">
                                        {difficulty.startsWith('novice') && (
                                            <p className="text-gold text-xs tracking-widest text-center opacity-80 flex items-center justify-center gap-1 animate-pulse">
                                                <i data-lucide="info" className="w-3 h-3"></i> 提示：左手為金色，右手為銀白色
                                            </p>
                                        )}
                                        {difficulty === 'expert' && (
                                            <p className="text-coffee-400 text-xs tracking-widest text-center opacity-80 flex items-center justify-center gap-1">
                                                <i data-lucide="flame" className="w-3 h-3"></i> 警告：鍵盤位置將完全打亂！
                                            </p>
                                        )}
                                    </div>
                                </div>

                                {/* Start Button */}
                                <button 
                                    onClick={handleStart}
                                    className="mt-2 group relative inline-flex items-center justify-center px-12 py-4 font-bold text-black bg-gradient-to-r from-coffee-300 via-gold to-coffee-300 rounded-sm overflow-hidden transition-all duration-300 hover:scale-105 shadow-[0_0_30px_rgba(212,175,55,0.3)] hover:shadow-[0_0_50px_rgba(212,175,55,0.6)] cursor-pointer tracking-[0.2em]"
                                >
                                    <span className="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
                                    <span className="relative flex items-center gap-2">
                                        INITIALIZE <i data-lucide="play" className="w-4 h-4 fill-black"></i>
                                    </span>
                                </button>
                            </div>

                            <div className="mt-12 text-coffee-400 text-xs tracking-widest text-center opacity-60">
                                <p>當字元落到下方判定線時，按下對應按鍵。</p>
                                <p className="mt-1">全程盯著螢幕，不要低頭看鍵盤！</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
