<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 絕對節奏 (Rhythm Flow) - 盲打特訓</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Serif+TC:wght@400;600;900&family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com/3.4.3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.344.0/umd/lucide.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', '"Noto Serif TC"', 'serif'],
                        sans: ['"Space Grotesk"', '"Outfit"', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['monospace'],
                    },
                    colors: {
                        coffee: {
                            900: 'var(--color-bg)',
                            800: 'oklch(14% 0.02 250)',
                            700: 'oklch(20% 0.03 250)',
                            600: 'oklch(26% 0.04 250)',
                            500: 'oklch(35% 0.05 250)',
                            400: 'oklch(70% 0.02 250)',
                            300: 'oklch(82% 0.15 85)',
                            200: 'oklch(90% 0.02 250)',
                            100: 'var(--color-text-main)'
                        },
                        gold: 'var(--color-secondary)',
                        cyan: 'var(--color-primary)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --color-bg: oklch(10% 0.015 250);
            --color-panel: oklch(13% 0.02 250);
            --color-primary: oklch(72% 0.18 250); /* Electric Blue */
            --color-secondary: oklch(82% 0.15 85); /* Champagne Gold */
            --color-tertiary: oklch(68% 0.22 350); /* Warning Crimson Pink */
            --color-text-main: oklch(97% 0.01 250);
            --color-text-sub: oklch(82% 0.02 250);
            --color-success: oklch(76% 0.14 142);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
            overflow: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: "Space Grotesk", "Outfit", system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 典雅發光效果 */
        .glow-text {
            text-shadow: 0 0 15px oklch(72% 0.18 250 / 0.4), 0 0 30px oklch(72% 0.18 250 / 0.2);
        }
        
        .glow-text-gold {
            text-shadow: 0 0 15px oklch(82% 0.15 85 / 0.5), 0 0 35px oklch(82% 0.15 85 / 0.3);
        }

        .btn-elegant {
            background: oklch(15% 0.02 250 / 0.45);
            border: 1px solid oklch(100% 0 0 / 0.08);
            color: var(--color-text-sub);
            border-radius: 12px;
            font-family: "Space Grotesk", "Outfit", sans-serif;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 4px 6px oklch(0% 0 0 / 0.15),
                inset 0 1px 1px oklch(100% 0 0 / 0.05);
        }

        .btn-elegant::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, oklch(100% 0 0 / 0.06), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-elegant:hover::before {
            transform: translateX(100%);
        }

        .btn-elegant:hover {
            border-color: var(--color-secondary);
            color: var(--color-text-main);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 24px oklch(82% 0.15 85 / 0.14),
                inset 0 1px 1px oklch(100% 0 0 / 0.1);
        }

        .btn-elegant:active {
            transform: translateY(1px) scale(0.97);
            box-shadow: 
                0 2px 4px oklch(0% 0 0 / 0.2),
                inset 0 1px 1px oklch(0% 0 0 / 0.1);
        }

        .btn-elegant.active {
            background: oklch(82% 0.15 85 / 0.1);
            border-color: var(--color-secondary);
            color: var(--color-secondary);
            box-shadow: 
                0 0 25px oklch(82% 0.15 85 / 0.25) inset,
                0 4px 12px oklch(82% 0.15 85 / 0.15);
            font-weight: 600;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, oklch(10% 0.015 250) 0%, oklch(14% 0.02 250) 100%);
            box-shadow: 0 0 60px oklch(0% 0 0 / 0.7);
            border-left: 1px solid oklch(100% 0 0 / 0.06);
            border-right: 1px solid oklch(100% 0 0 / 0.06);
            border-radius: 16px;
        }

        /* Ambient background mesh gradient */
        .ambient-mesh {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 20%, oklch(72% 0.18 250 / 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, oklch(82% 0.15 85 / 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, oklch(68% 0.22 350 / 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, oklch(100% 0 0 / 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, oklch(100% 0 0 / 0.015) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse at center, black, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black, transparent 75%);
            pointer-events: none;
